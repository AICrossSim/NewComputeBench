name: build-site

on:
  push:
    branches:
      - master
      - site

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Sphinx dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: sphinx-${{ hashFiles('pyproject.toml') }}
          restore-keys: sphinx-

      - name: Install Sphinx toolchain
        run: pip install sphinx sphinx-book-theme sphinx-autobuild

      - name: Build HTML
        run: cd docs && make html

      - name: Deploy to GitHub Pages
        run: |
          pip install ghp-import
          ghp-import -n -p -f docs/build/html
